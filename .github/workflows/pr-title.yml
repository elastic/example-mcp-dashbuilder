# Enforces that PR titles follow the Conventional Commits format. Since the
# repo uses squash-merges, the PR title becomes the commit message that
# semantic-release reads to decide the next version.

name: PR title

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize

permissions:
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            perf
            build
            chore
            docs
            revert
          requireScope: false
          subjectPattern: ^[A-Z].+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}" didn't
            match the required pattern: it must start with an uppercase letter.
