name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: Lint, Test, Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  integration-tests:
    name: Integration Tests (ES/Kibana ${{ matrix.stack-version }})
    runs-on: ubuntu-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        stack-version: ['9.3.0', '9.4.0-SNAPSHOT']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Docker images
        run: |
          docker pull docker.elastic.co/elasticsearch/elasticsearch:${{ matrix.stack-version }}
          docker pull docker.elastic.co/kibana/kibana:${{ matrix.stack-version }}

      - name: Run integration tests
        working-directory: server
        env:
          CI: true
          STACK_VERSION: ${{ matrix.stack-version }}
        run: npx vitest run --config vitest.integration.config.ts
