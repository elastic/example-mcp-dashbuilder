name: Release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run check
      - run: npm test

  release:
    needs: build-and-test
    runs-on: ubuntu-latest
    # Semantic-release is configured for main only; guard the job so a
    # misfired dispatch from another branch fails fast instead of running install/build.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: bash scripts/bundle.sh

      - name: Pack MCPB bundle
        run: npx @anthropic-ai/mcpb pack .

      - name: Pack npm tarball
        run: |
          npm pack --workspace=server
          cp mcp-dashboards-server-*.tgz example-mcp-dashbuilder.tgz

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
